<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W3BPIX | White Rabbit</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #terminal { width: 90%; max-width: 600px; font-size: 1.2rem; line-height: 1.6; }
        .links { margin-top: 20px; display: none; }
        a { color: #00ff41; text-decoration: none; border: 1px solid #00ff41; padding: 10px; margin-right: 10px; display: inline-block; }
        a:hover { background: #00ff41; color: #000; }
        .cursor { display: inline-block; width: 10px; height: 1.2rem; background: #00ff41; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="terminal">
        <span id="target"></span><span class="cursor" id="c"></span>
        <div id="l" class="links">
            <a href="https://www.linkedin.com/in/rubenkuijsters/">> LINKEDIN</a>
            <a href="https://x.com/w3bpix">> X</a>
            <a href="mailto:ruben@w3bpix.nl">> CONTACT</a>
        </div>
    </div>

    <script>
        var msg = "Hello friend.\n\nI'm just a guy who likes the white rabbit and isn't sure he's a human or AI.\n\nRebel. Verified.\n\n> Accessing links...";
        var pos = 0;
        
        function type() {
            document.getElementById("target").innerText += msg.charAt(pos);
            pos++;
            if (pos < msg.length) {
                setTimeout(type, 40);
            } else {
                document.getElementById("l").style.display = "block";
                document.getElementById("c").style.display = "none";
            }
        }
        
        // Start direct
        type();
    </script>
</body>
</html>
