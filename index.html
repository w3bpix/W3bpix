<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W3BPIX | Hello Friend</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 5px #00ff41;
        }
        #terminal {
            width: 90%;
            max-width: 600px;
            font-size: 1.2rem;
            line-height: 1.5;
        }
        .links {
            margin-top: 20px;
            display: none; /* Verbergt de links tot het typen klaar is */
        }
        a {
            color: #00ff41;
            text-decoration: none;
            border: 1px solid #00ff41;
            padding: 8px 15px;
            margin-right: 10px;
            display: inline-block;
            transition: all 0.3s;
        }
        a:hover {
            background-color: #00ff41;
            color: #0a0a0a;
            box-shadow: 0 0 15px #00ff41;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #00ff41;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="terminal">
        <span id="text"></span><span class="cursor" id="cursor">&nbsp;</span>
        
        <div class="links" id="links">
            <br>
            <a href="https://www.linkedin.com/in/JOUW-PROFIEL" target="_blank">> LINKEDIN</a>
            <a href="mailto:ruben@w3bpix.nl">> EMAIL</a>
        </div>
    </div>

    <script>
        const content = "Hello friend.\nWelcome to W3BPIX.\n\nThe revolution is now live.\nEverything for 12 cents.\n\n> Accessing profiles...";
        let i = 0;
        const speed = 50;

        function typeWriter() {
            if (i < content.length) {
                const char = content.charAt(i);
                document.getElementById("text").innerText += char;
                i++;
                setTimeout(typeWriter, speed);
            } else {
                // Als het typen klaar is: toon de links en stop de cursor
                document.getElementById("links").style.display = "block";
                document.getElementById("cursor").style.display = "none";
            }
        }

        // Start het effect na een kleine vertraging
        setTimeout(typeWriter, 1000);
    </script>
</body>
</html>
