<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W3BPIX | White Rabbit</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 5px #00ff41;
            overflow: hidden;
        }
        #terminal {
            width: 90%;
            max-width: 650px;
            font-size: 1.1rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .links {
            margin-top: 30px;
            display: none; 
        }
        a {
            color: #00ff41;
            text-decoration: none;
            border: 1px solid #00ff41;
            padding: 10px 20px;
            margin: 10px 10px 10px 0;
            display: inline-block;
            transition: all 0.1s;
            font-weight: bold;
            position: relative;
        }
        /* Glitch effect op hover */
        a:hover {
            background-color: #00ff41;
            color: #0a0a0a;
            box-shadow: 0 0 20px #00ff41;
            transform: skew(-5deg);
        }
        a:active {
            transform: scale(0.95);
        }
        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.2rem;
            background-color: #00ff41;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="terminal">
        <span id="text"></span><span class="cursor" id="cursor"></span>
        
        <div class="links" id="links">
            <a href="https://www.linkedin.com/in/rubenkuijsters/" target="_blank">> LINKEDIN</a>
            <a href="https://x.com/w3bpix" target="_blank">> X (TWITTER)</a>
