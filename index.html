<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W3BPIX | Tech & AI</title>
    <style>
        /* 1. DE TECH BASE */
        body { 
            background-color: #000;
            background-image: 
                radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px, 100px 100px;
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            min-height: 200vh;
            color: #fff;
            overflow-x: hidden;
            animation: techMove 100s linear infinite;
        }

        @keyframes techMove {
            from { background-position: 0 0, 20px 20px; }
            to { background-position: 500px 1000px, 200px 400px; }
        }

        /* 2. HET LOGO & DE SLOGAN */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            pointer-events: none;
        }

        .logo-box { display: flex; align-items: center; transition: all 0.7s ease; }

        .badge {
            background: #fff; color: #000; font-weight: 900;
            font-size: 45px; padding: 10px 20px; border-radius: 12px;
            margin-right: 6px; box-shadow: 0 0 25px rgba(255,255,255,0.2);
            transition: all 0.7s ease;
        }

        .name { font-weight: 900; font-size: 55px; letter-spacing: -4px; transition: all 0.7s ease; }

        .slogan {
            margin-top: 15px; font-size: 12px; letter-spacing: 4px; 
            text-transform: uppercase; opacity: 0.5; transition: all 0.5s ease;
        }

        /* 3. DE SCROLLED STATE (DE GLITCH) */
        body.scrolled header {
            height: 80px; justify-content: flex-start; padding-left: 30px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        body.scrolled .logo-box { transform: scale(0.45); transform-origin: left center; }
        body.scrolled .slogan { opacity: 0; transform: translateY(-20px); pointer-events: none; }

        /* 4. CONTENT & KNOPPEN */
        .content {
            padding-top: 110vh; display: flex; flex-direction: column; align-items: center;
            gap: 20px; width: 100%; padding-bottom: 100px;
        }

        .btn {
            display: block; width: 280px; padding: 20px; text-align: center; 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: #fff; text-decoration: none; border-radius: 15px; font-weight: bold; 
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease;
        }

        .btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-5px); border-color: rgba(255,255,255,0.4); }

        .footer { margin-top: 50px; font-size: 10px; opacity: 0.3; letter-spacing: 3px; }
    </style>
</head>
<body id="mainBody">

    <header>
        <div class="logo-box">
            <div class="badge">W3</div>
            <div class="name">BPIX</div>
        </div>
        <div class="slogan">Pixels. Protocols. Progress.</div>
    </header>

    <div class="content">
        <a href="https://www.linkedin.com/in/rubenkuijsters/" target="_blank" class="btn">LINKEDIN</a>
        <a href="mailto:w3bpix@gmail.com" class="btn">CONTACT MAIL</a>
        <div class="footer">W3BPIX — EST. 2026 — AMSTERDAM</div>
    </div>

    <script>
        window.onscroll = function() {
            if (window.pageYOffset > 50) {
                document.getElementById("mainBody").classList.add("scrolled");
            } else {
                document.getElementById("mainBody").classList.remove("scrolled");
            }
        };
    </script>
</body>
</html>
